  <!-- legend -->
  <rect x="40" y="540" width="1120" height="160" class="b"/>
  <text x="56" y="566" class="h">How phases run</text>
  <text x="56" y="588" class="lab">• BuildPlanTask picks the head phase, materializes a subtask (TutorialTask / QuestTask / SkillTask), adds it to scheduler.</text>
  <text x="56" y="608" class="lab">• Scheduler ticks subtask each onLoop until subtask.isComplete() → BuildPlanTask advances cursor → materializes next phase.</text>
  <text x="56" y="628" class="lab">• Antiban &amp; BreakManager sit alongside at priorities 20 / 5 — they preempt subtasks when due.</text>
  <text x="56" y="648" class="lab">• Skill targets are deliberately low (combat ~20-30) so the account satisfies dragon-slayer-prep and Restless Ghost combat in pass 1.</text>
  <text x="56" y="668" class="lab">• Each phase is a Profile.BuildPlan.Phase — fully editable in the GUI Plan tab. The "Default F2P" button restores this set.</text>
  <text x="56" y="686" class="sub">Anchor: see BuildPlan.defaultF2P() in profile/BuildPlan.java</text>

