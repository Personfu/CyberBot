<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="1280" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0c1015"/>
      <stop offset="60%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0a1d3a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#00dc82"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1a2535" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1280" height="280" fill="url(#bgGrad)"/>
  <rect width="1280" height="280" fill="url(#grid)"/>

  <!-- decorative bars -->
  <rect x="0" y="0"   width="1280" height="3" fill="#00dc82" opacity="0.6"/>
  <rect x="0" y="277" width="1280" height="3" fill="#ffd54a" opacity="0.6"/>

  <text x="60" y="120" font-family="Consolas, monospace" font-size="64" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
    FLLC Master AIO
  </text>
  <text x="62" y="160" font-family="Consolas, monospace" font-size="22" fill="#a0a8b3">
    From-zero account builder · 23 skills · 10 F2P quests · Tutorial Island · Antiban · Discord notify
  </text>
  <text x="62" y="200" font-family="Consolas, monospace" font-size="18" fill="#6e7682">
    DreamBot 4.x · Java 11 · Bezier mouse · varbit-tracked quests · Quest-Helper compatible IDs
  </text>

  <!-- mini badges -->
  <g font-family="Consolas, monospace" font-size="13" font-weight="bold">
    <rect x="62"  y="220" width="86" height="26" rx="4" fill="#143018" stroke="#00dc82" stroke-width="1"/>
    <text x="73"  y="238" fill="#00dc82">v2.0 BUILT</text>

    <rect x="158" y="220" width="86" height="26" rx="4" fill="#1a1a30" stroke="#5c67f2" stroke-width="1"/>
    <text x="172" y="238" fill="#5c67f2">DREAMBOT 4</text>

    <rect x="254" y="220" width="74" height="26" rx="4" fill="#2e1a30" stroke="#ffd54a" stroke-width="1"/>
    <text x="267" y="238" fill="#ffd54a">F2P AIO</text>

    <rect x="338" y="220" width="82" height="26" rx="4" fill="#1f1f1f" stroke="#888" stroke-width="1"/>
    <text x="351" y="238" fill="#aaa">MIT LICENSE</text>
  </g>

  <!-- right-side schematic -->
  <g transform="translate(880, 60)" stroke="#0a3" fill="none" stroke-width="1.5">
    <rect x="0"   y="0"   width="130" height="38" rx="5" stroke="#ffd54a"/>
    <text x="14"  y="24" font-family="Consolas, monospace" font-size="13" fill="#ffd54a">Profile / Plan</text>

    <rect x="0"   y="55"  width="130" height="38" rx="5" stroke="#00dc82"/>
    <text x="14"  y="79" font-family="Consolas, monospace" font-size="13" fill="#00dc82">TaskScheduler</text>

    <rect x="170" y="0"   width="180" height="38" rx="5" stroke="#5c67f2"/>
    <text x="184" y="24" font-family="Consolas, monospace" font-size="13" fill="#5c67f2">Tutorial → Quests → Skills</text>

    <rect x="170" y="55"  width="180" height="38" rx="5" stroke="#a05cf2"/>
    <text x="184" y="79" font-family="Consolas, monospace" font-size="13" fill="#a05cf2">Antiban / Breaks / Mouse</text>

    <line x1="130" y1="19" x2="170" y2="19" stroke="#666"/>
    <line x1="130" y1="74" x2="170" y2="74" stroke="#666"/>
    <line x1="65"  y1="38" x2="65"  y2="55" stroke="#666"/>
  </g>
</svg>
