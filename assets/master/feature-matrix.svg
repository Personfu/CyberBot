    <text x="600" y="318" class="yes">✓</text>
    <text x="720" y="318" class="yes">✓</text>
    <text x="840" y="318" class="yes">✓</text>
    <text x="960" y="318" class="yes">✓</text>
    <text x="1080" y="318" class="yes">✓</text>

    <!-- 7 -->
    <rect x="40" y="332" width="520" height="32" class="row"/>
    <text x="56" y="352" class="lab">Break manager + fatigue model</text>
    <text x="600" y="354" class="yes">✓</text>
    <text x="720" y="354" class="yes">✓</text>
    <text x="840" y="354" class="yes">✓</text>
    <text x="960" y="354" class="yes">✓</text>
    <text x="1080" y="354" class="part">basic</text>

    <!-- 8 -->
    <rect x="40" y="368" width="520" height="32" class="row"/>
    <text x="56" y="388" class="lab">Muling / cross-account GP transfer</text>
    <text x="600" y="390" class="part">config-only</text>
    <text x="720" y="390" class="yes">✓</text>
    <text x="840" y="390" class="part">basic</text>
    <text x="960" y="390" class="yes">✓</text>
    <text x="1080" y="390" class="no">✗</text>

    <!-- 9 -->
    <rect x="40" y="404" width="520" height="32" class="row"/>
    <text x="56" y="424" class="lab">Discord webhook notifications</text>
    <text x="600" y="426" class="part">config</text>
    <text x="720" y="426" class="yes">✓</text>
    <text x="840" y="426" class="yes">✓</text>
    <text x="960" y="426" class="yes">✓</text>
    <text x="1080" y="426" class="part">basic</text>

    <!-- 10 -->
    <rect x="40" y="440" width="520" height="32" class="row"/>
    <text x="56" y="460" class="lab">Source available + MIT-licensed</text>
    <text x="600" y="462" class="yes">✓</text>
    <text x="720" y="462" class="no">closed</text>
    <text x="840" y="462" class="no">closed</text>
    <text x="960" y="462" class="no">closed</text>
    <text x="1080" y="462" class="no">closed</text>

    <!-- 11 -->
    <rect x="40" y="476" width="520" height="32" class="row"/>
    <text x="56" y="496" class="lab">Price</text>
    <text x="588" y="498" class="yes">$0 (MIT)</text>
    <text x="700" y="498" class="part">$15–25/mo</text>
    <text x="820" y="498" class="part">$10–20/mo</text>
    <text x="940" y="498" class="part">lifetime $</text>
    <text x="1056" y="498" class="part">lifetime $</text>
