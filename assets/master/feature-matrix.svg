<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" width="1180" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0c1015"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <style>
      .title { font: bold 22px Consolas,monospace; fill:#ffd54a; }
      .sub   { font: 12px Consolas,monospace; fill:#9aa6b3; }
      .h     { font: bold 13px Consolas,monospace; fill:#00dc82; }
      .lab   { font: 12px Consolas,monospace; fill:#dbe1eb; }
      .row   { fill:#1a2230; stroke:#2c3a4f; stroke-width:0.8; }
      .row-a { fill:#142640; stroke:#5c67f2; stroke-width:0.8; }
      .yes   { font: bold 16px Consolas,monospace; fill:#00dc82; }
      .no    { font: 16px Consolas,monospace; fill:#ff5f56; }
      .part  { font: bold 14px Consolas,monospace; fill:#ffd54a; }
    </style>
  </defs>
  <rect width="1180" height="520" fill="url(#bg)"/>

  <text x="40" y="40" class="title">Feature Matrix — Master AIO vs. DreamBot premium AIOs</text>
  <text x="40" y="60" class="sub">honest comparison; commercial scripts have years of patches and per-task depth Master AIO doesn't (yet) match</text>

  <!-- Header -->
  <rect x="40" y="80"  width="520" height="32" class="row-a"/>
  <rect x="560" y="80" width="120" height="32" class="row-a"/>
  <rect x="680" y="80" width="120" height="32" class="row-a"/>
  <rect x="800" y="80" width="120" height="32" class="row-a"/>
  <rect x="920" y="80" width="120" height="32" class="row-a"/>
  <rect x="1040" y="80" width="100" height="32" class="row-a"/>
  <text x="56"  y="100" class="h">Feature</text>
  <text x="576" y="100" class="h">Master AIO</text>
  <text x="696" y="100" class="h">SlugBuilder</text>
  <text x="816" y="100" class="h">HowP2PAIO</text>
  <text x="936" y="100" class="h">Dreamy AIO</text>
  <text x="1056" y="100" class="h">Sub Quester</text>

  <!-- Row helper text -->
  <g>
