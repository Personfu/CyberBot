    <rect x="40" y="116" width="520" height="32" class="row"/>
    <text x="56" y="136" class="lab">Tutorial Island automation</text>
    <text x="600" y="138" class="yes">✓</text>
    <text x="720" y="138" class="yes">✓</text>
    <text x="840" y="138" class="yes">✓</text>
    <text x="960" y="138" class="yes">✓</text>
    <text x="1080" y="138" class="no">✗</text>

    <!-- 2 -->
    <rect x="40" y="152" width="520" height="32" class="row"/>
    <text x="56" y="172" class="lab">10+ F2P quests</text>
    <text x="600" y="174" class="yes">✓</text>
    <text x="720" y="174" class="yes">✓</text>
    <text x="840" y="174" class="yes">✓</text>
    <text x="960" y="174" class="yes">✓</text>
    <text x="1080" y="174" class="yes">✓</text>

    <!-- 3 -->
    <rect x="40" y="188" width="520" height="32" class="row"/>
    <text x="56" y="208" class="lab">100+ quests (F2P + P2P + diaries)</text>
    <text x="600" y="210" class="no">✗</text>
    <text x="720" y="210" class="part">~70</text>
    <text x="840" y="210" class="yes">109</text>
    <text x="960" y="210" class="part">~50</text>
    <text x="1080" y="210" class="yes">101</text>

