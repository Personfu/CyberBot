# Drop tables — schema:
#   <NpcName>:
#     always:                # rolled every kill, no chance
#       - item: "Item name"
#         quantity: 1                  # exact value
#         quantity_range: [min, max]   # OR a range, engine picks uniformly
#     rolls: N               # how many independent rolls against the weighted table per kill
#     weighted_total: WEIGHT # sum of all weights below (engine validates)
#     entries:
#       - item: "Item name"
#         quantity: 1
#         weight: W
#         rare: true|false              # if true, multiplied by rare_drop_multiplier from rates.yml

Chicken:
  always:
    - item: "Bones"
      quantity: 1
    - item: "Raw chicken"
      quantity: 1
    - item: "Feather"
      quantity_range: [5, 15]
  rolls: 0
  weighted_total: 0
  entries: []

Cow:
  always:
    - item: "Bones"
      quantity: 1
    - item: "Cowhide"
      quantity: 1
    - item: "Raw beef"
      quantity: 1
  rolls: 0
  weighted_total: 0
  entries: []

Gargoyle:
  always:
    - item: "Bones"
      quantity: 1
  rolls: 1
  weighted_total: 256
  entries:
    - {item: "Coins",                quantity_range: [400, 2000], weight: 80}
    - {item: "Steel battleaxe",      quantity: 1,                 weight: 12}
    - {item: "Mithril kiteshield",   quantity: 1,                 weight: 10}
    - {item: "Rune dagger",          quantity: 1,                 weight: 6}
    - {item: "Adamant 2h sword",     quantity: 1,                 weight: 5}
    - {item: "Mithril boots",        quantity: 1,                 weight: 4}
    - {item: "Granite maul",         quantity: 1,                 weight: 1, rare: true}
    - {item: "Coins",                quantity_range: [3000, 10000], weight: 22}
    - {item: "Pure essence",         quantity_range: [25, 100],   weight: 36}
    - {item: "Mithril ore",          quantity_range: [5, 15],     weight: 30}
    - {item: "Mossy key",            quantity: 1,                 weight: 50}

